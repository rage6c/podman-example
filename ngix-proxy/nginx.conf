events {}

http {
    access_log /logs/ngix-proxy/ngix-proxy.log;
    error_log /logs/ngix-proxy/ngix-proxy.log info;

    upstream spring_service {
        server spring-service:8080;
    }

    upstream python_service {
        server python-service:8080;
    }

    upstream quarkus_service {
        server quarkus-native-service:8080;
    }

    server {
        listen 8080;
        server_name _;

        location = / {
            default_type application/json;
            return 200 '{"status":"ok"}';
        }

        location /spring-service/ {
            rewrite ^/spring-service/(.*)$ /$1 break;
            proxy_pass http://spring_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /spring-service {
            proxy_pass http://spring_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /python-service/ {
            rewrite ^/python-service/(.*)$ /$1 break;
            proxy_pass http://python_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /python-service {
            proxy_pass http://python_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /quarkus-service/ {
            rewrite ^/quarkus-service/(.*)$ /$1 break;
            proxy_pass http://quarkus_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /quarkus-service {
            proxy_pass http://quarkus_service/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
